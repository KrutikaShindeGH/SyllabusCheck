# railway.toml — SyllabusCheck Worker (backend/)
# This file is used by the SyllabusCheck-worker service.
# Root Directory on Railway must be set to: backend

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "celery -A core.celery_app worker --loglevel=info --concurrency=2"
# No healthcheckPath — Celery has no HTTP server
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

