# railway.toml — SyllabusCheck Backend (FastAPI)
# Place this file at: backend/railway.toml
#
# Railway reads this when you link the /backend subdirectory
# as a Railway service. It controls build + start commands.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
